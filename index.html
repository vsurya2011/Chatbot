<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <style>
        /* --- General Styles --- */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* --- Login Page Styles --- */
        #login-section {
            font-family: 'Inter', sans-serif;
        }

        .error-message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ef4444;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: none;
        }

        /* --- Chat Page Styles --- */
        #chat-section {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #000;
            position: relative;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 80px 20px 130px; 
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            line-height: 1.6;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
        }

        /* Markdown Styling within Messages */
        .message strong { font-weight: 700; color: #fff; }
        .message em { font-style: italic; opacity: 0.9; }
        .message code { 
            background: rgba(255,255,255,0.1); 
            padding: 2px 4px; 
            border-radius: 4px; 
            font-family: monospace;
            font-size: 0.9em;
        }
        .message pre {
            background: #0a0a0a;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            border: 1px solid #333;
        }
        .message ul, .message ol { margin-left: 20px; margin-top: 8px; }
        .message li { margin-bottom: 4px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background-color: #3b82f6;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.bot {
            align-self: flex-start;
            background-color: #1a1a1a;
            color: #e5e7eb;
            border-bottom-left-radius: 2px;
            border: 1px solid #333;
        }

        /* --- Speech Page Styles --- */
        #speech-section {
            background: #000;
            height: 100vh;
            position: relative;
            overflow: hidden;
            transition: background 1s ease;
        }

        #speech-section.speaking {
            background: radial-gradient(circle at center, #1e1b4b 0%, #000 100%);
        }

        .orb-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin-bottom: 50px;
        }

        .orb {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
            filter: blur(20px);
            opacity: 0.6;
            animation: pulse 4s infinite ease-in-out;
            transition: background 0.5s ease;
        }

        .orb-2 {
            animation-delay: -2s; 
            background: radial-gradient(circle, #8b5cf6 0%, transparent 70%);
        }

        .speaking .orb {
            background: radial-gradient(circle, #22d3ee 0%, transparent 70%);
            animation: pulse 1.5s infinite ease-in-out;
            opacity: 0.8;
        }

        .speaking .orb-2 {
            background: radial-gradient(circle, #ec4899 0%, transparent 70%);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .speech-star-button {
            position: relative;
            width: 80px;
            height: 80px;
            background: #fff;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            z-index: 10;
        }

        .speech-star-button.listening {
            background: #ef4444;
            color: white;
            animation: ring 1.5s infinite;
        }

        @keyframes ring {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* --- History Panel --- */
        #history-panel {
            position: fixed;
            top: 0;
            left: -320px;
            width: 300px;
            height: 100vh;
            background: #111;
            border-right: 1px solid #222;
            z-index: 100;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 80px 20px 20px;
        }

        #history-panel.open { left: 0; }

        .history-item {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 0.8rem;
            position: relative;
        }

        /* Delete Button Styles */
        .history-delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            color: #ef4444;
            opacity: 0;
            transition: opacity 0.2s ease;
            background: none;
            border: none;
            cursor: pointer;
        }

        .history-item:hover .history-delete-btn {
            opacity: 1;
        }

        /* Loading Dots */
        .dots { display: inline-flex; align-items: center; gap: 4px; }
        .dot { width: 6px; height: 6px; background: currentColor; border-radius: 50%; animation: dot-wave 1.2s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dot-wave {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        .hide { display: none !important; }
    </style>
</head>
<body class="bg-black text-white">

    <div id="error-container" class="error-message"></div>

    <div id="history-panel">
        <h3 class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-4">Recent History</h3>
        <div id="history-list" class="overflow-y-auto flex-1"></div>
    </div>

    <section id="login-section" class="flex flex-col items-center justify-center h-screen px-6">
        <div class="w-full max-w-md text-center">
            <h1 class="text-5xl font-bold mb-4 tracking-tight">ATHENA</h1>
            <p class="text-gray-400 mb-8 text-lg">Your intelligent companion.</p>
            <div id="login-main-content" class="space-y-4"></div>
        </div>
    </section>

    <nav id="app-nav" class="fixed top-0 left-0 right-0 p-6 flex justify-between items-center z-50 hide">
        <div class="flex items-center gap-2 cursor-pointer" id="history-trigger">
            <div class="w-2 h-2 bg-blue-500 rounded-full shadow-[0_0_8px_#3b82f6]"></div>
            <span class="font-semibold tracking-widest text-sm">ATHENA</span>
        </div>
        <div class="flex items-center gap-6">
            <button id="nav-new-chat" class="text-gray-400 hover:text-white transition-colors" title="New Chat"><i class="fa-solid fa-plus"></i></button>
            <button id="nav-chat" class="text-gray-400 hover:text-white transition-colors" title="Chat"><i class="fa-solid fa-message"></i></button>
            <button id="nav-speech" class="text-gray-400 hover:text-white transition-colors" title="Voice"><i class="fa-solid fa-microphone"></i></button>
            <button id="nav-logout" class="text-gray-400 hover:text-red-500 transition-colors" title="Log Out"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </nav>

    <section id="chat-section" class="hide">
        <div id="chat-messages"></div>
        
        <div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black via-black/90 to-transparent pt-16 z-10 pointer-events-none">
            <div class="max-w-4xl mx-auto relative pointer-events-auto">
                <input type="text" id="chat-input" placeholder="Ask anything..." class="w-full bg-[#111] border border-[#222] rounded-full py-4 px-6 pr-14 focus:outline-none focus:border-blue-500 transition-all text-white shadow-2xl" autocomplete="off" spellcheck="false">
                <button id="chat-send" class="absolute right-3 top-1/2 -translate-y-1/2 w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center hover:bg-blue-500 transition-colors">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
        </div>
    </section>

    <section id="speech-section" class="hide flex flex-col items-center justify-center">
        <div class="orb-container">
            <div class="orb"></div>
            <div class="orb orb-2"></div>
        </div>
        <div id="speech-log" class="text-center px-10 h-36 mb-8 overflow-hidden flex flex-col justify-center">
            <p id="speech-status" class="text-gray-500 uppercase tracking-widest text-xs mb-2">Tap to speak</p>
            <div id="speech-text" class="text-xl font-medium text-white max-w-2xl mx-auto w-full"></div>
        </div>
        <div id="speech-star-button" class="speech-star-button">
            <i class="fa-solid fa-microphone"></i>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, serverTimestamp, off } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyAp41TDfxH2iWNMUMJAju0DsBcl-dprEIc",
            authDomain: "athena-7f2be.firebaseapp.com",
            projectId: "athena-7f2be",
            storageBucket: "athena-7f2be.firebasestorage.app",
            messagingSenderId: "672677295988",
            appId: "1:672677295988:web:86af92a0b0c94cd0ea1e21",
            measurementId: "G-2J10P7VKTP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- Configuration & Constants ---
        const API_KEY = "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"; 
        const ADMIN_USER = "AiAdmin";
        const ADMIN_PASS = "45510ai";
        
        // --- State Management ---
        window.currentUser = null;
        let isListening = false;
        let isSpeaking = false;
        let recognition = null;
        let currentSection = 'login';
        let historyPanelOpen = false;
        
        // Firebase History State
        let chatHistoryData = {};
        let activeHistoryListener = null;

        // --- Speech Lyric Queues ---
        let speechQueue = [];
        let speechQueueIndex = 0;

        // --- DOM Elements ---
        const loginSection = document.getElementById('login-section');
        const chatSection = document.getElementById('chat-section');
        const speechSection = document.getElementById('speech-section');
        const appNav = document.getElementById('app-nav');
        const loginMainContent = document.getElementById('login-main-content');
        const errorContainer = document.getElementById('error-container');
        const historyPanel = document.getElementById('history-panel');
        const historyList = document.getElementById('history-list');
        const historyTrigger = document.getElementById('history-trigger');
        const chatInput = document.getElementById('chat-input');
        const chatSend = document.getElementById('chat-send');
        const chatMessages = document.getElementById('chat-messages');
        const speechStarButton = document.getElementById('speech-star-button');
        const speechText = document.getElementById('speech-text');
        const speechStatus = document.getElementById('speech-status');

        // Configure Marked for secure rendering
        marked.setOptions({ breaks: true, gfm: true });

        // --- Helpers ---
        function showError(msg) {
            errorContainer.textContent = msg;
            errorContainer.style.display = 'block';
            setTimeout(() => { errorContainer.style.display = 'none'; }, 3000);
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // We sanitize the email so Firebase doesn't crash on dots or symbols in the folder name
        function getSanitizedEmail(email) {
            return email.replace(/[.#$[\]]/g, '_');
        }

        window.startNewChat = function() {
            chatMessages.innerHTML = '';
            chatInput.value = '';
            chatInput.focus();
            closeHistory();
        }

        window.switchSection = function(target) {
            [loginSection, chatSection, speechSection].forEach(s => s.classList.add('hide'));
            appNav.classList.add('hide');
            closeHistory();

            if (target === 'login') {
                loginSection.classList.remove('hide');
                window.renderLoginContent();
            } else if (target === 'chat') {
                chatSection.classList.remove('hide');
                appNav.classList.remove('hide');
                requestAnimationFrame(() => chatInput.focus());
            } else if (target === 'speech') {
                speechSection.classList.remove('hide');
                appNav.classList.remove('hide');
            }
            currentSection = target;
            
            if (isSpeaking) {
                window.speechSynthesis.cancel();
                isSpeaking = false;
                speechText.innerHTML = "";
            }
            if (isListening && recognition) recognition.stop();
        }

        // --- Firebase History Logic ---
        function saveToHistory(question, answer) {
            if (!window.currentUser) return;
            const userKey = getSanitizedEmail(window.currentUser.email);
            const historyRef = ref(db, `history/${userKey}`);
            
            push(historyRef, {
                question: question,
                answer: answer,
                timestamp: new Date().toLocaleTimeString(),
                createdAt: serverTimestamp() 
            });
        }

        function listenToHistory() {
            if (!window.currentUser) return;
            const userKey = getSanitizedEmail(window.currentUser.email);
            const historyRef = ref(db, `history/${userKey}`);
            
            // Clean up old listener if switching users
            if(activeHistoryListener) off(activeHistoryListener);
            
            activeHistoryListener = historyRef;
            onValue(historyRef, (snapshot) => {
                chatHistoryData = snapshot.val() || {};
                renderHistoryUI();
            });
        }

        function renderHistoryUI() {
            if (!chatHistoryData || Object.keys(chatHistoryData).length === 0) {
                historyList.innerHTML = `<p class="text-gray-600 text-xs text-center italic mt-4">No recent activity</p>`;
                return;
            }

            // Convert to array and sort (newest top)
            const sortedHistory = Object.keys(chatHistoryData).map(key => {
                return { key: key, ...chatHistoryData[key] };
            }).reverse();

            historyList.innerHTML = sortedHistory.map((item) => `
                <div class="history-item cursor-pointer hover:bg-[#252525] hover:border-blue-500/50 transition-all duration-200 group" onclick="loadHistoryItem('${item.key}')">
                    <button onclick="event.stopPropagation(); deleteHistoryItem('${item.key}')" class="history-delete-btn" title="Delete">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                    <p class="text-blue-400 font-bold mb-1 group-hover:text-blue-300 flex items-center justify-between pr-6">
                        <span>Q: ${escapeHtml(item.question.substring(0, 35))}${item.question.length > 35 ? '...' : ''}</span>
                        <i class="fa-solid fa-chevron-right text-[10px] opacity-0 group-hover:opacity-100 transition-opacity"></i>
                    </p>
                    <p class="text-gray-300 text-xs line-clamp-2">${escapeHtml(item.answer.substring(0, 80))}${item.answer.length > 80 ? '...' : ''}</p>
                    <p class="text-[10px] text-gray-600 mt-2">${item.timestamp}</p>
                </div>
            `).join('');
        }

        window.deleteHistoryItem = function(key) {
            if (!window.currentUser) return;
            const userKey = getSanitizedEmail(window.currentUser.email);
            remove(ref(db, `history/${userKey}/${key}`)).catch(e => showError("Failed to delete item"));
        }

        window.loadHistoryItem = function(key) {
            const item = chatHistoryData[key];
            if (!item) return;

            chatMessages.innerHTML = '';
            addChatMessage(item.question, 'user');
            addChatMessage(item.answer, 'bot');

            window.switchSection('chat');
            closeHistory();
        };

        function toggleHistory() {
            historyPanelOpen = !historyPanelOpen;
            if (historyPanelOpen) {
                historyPanel.classList.add('open');
            } else {
                historyPanel.classList.remove('open');
            }
        }

        function closeHistory() {
            historyPanelOpen = false;
            historyPanel.classList.remove('open');
        }

        // --- Original Local Storage Authentication Process (Unchanged) ---
        window.renderLoginContent = function() {
            loginMainContent.innerHTML = `
                <button id="btn-login-trigger" class="w-full bg-white text-black font-bold py-4 rounded-xl hover:bg-gray-200 transition-all">Log In</button>
                <button id="btn-signup-trigger" class="w-full bg-transparent border border-gray-700 font-bold py-4 rounded-xl hover:bg-[#111] transition-all">Sign Up</button>
            `;

            document.getElementById('btn-login-trigger').onclick = () => {
                loginMainContent.innerHTML = `
                    <input type="text" id="login-email" placeholder="Username or Email" class="w-full bg-[#111] border border-[#222] p-4 rounded-xl focus:outline-none focus:border-blue-500 text-white">
                    <input type="password" id="login-pw" placeholder="Password" class="w-full bg-[#111] border border-[#222] p-4 rounded-xl focus:outline-none focus:border-blue-500 text-white">
                    <button id="do-login" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-500 transition-all">Enter Athena</button>
                    <p class="text-xs text-gray-500 cursor-pointer hover:text-white mt-2" onclick="renderLoginContent()">Back</p>
                `;
                document.getElementById('do-login').onclick = () => window.loginUser();
            };

            document.getElementById('btn-signup-trigger').onclick = () => {
                loginMainContent.innerHTML = `
                    <input type="text" id="signup-name" placeholder="Full Name" class="w-full bg-[#111] border border-[#222] p-4 rounded-xl focus:outline-none focus:border-blue-500 text-white">
                    <input type="email" id="signup-email" placeholder="Email" class="w-full bg-[#111] border border-[#222] p-4 rounded-xl focus:outline-none focus:border-blue-500 text-white">
                    <input type="password" id="signup-pw" placeholder="Password" class="w-full bg-[#111] border border-[#222] p-4 rounded-xl focus:outline-none focus:border-blue-500 text-white">
                    <button id="do-signup" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-500 transition-all">Create Account</button>
                    <p class="text-xs text-gray-500 cursor-pointer hover:text-white mt-2" onclick="renderLoginContent()">Back</p>
                `;
                document.getElementById('do-signup').onclick = () => window.registerUser();
            };
        }

        window.registerUser = function() {
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const pass = document.getElementById('signup-pw').value;
            if(!name || !email || !pass) return showError("Please fill all fields");
            
            const users = JSON.parse(localStorage.getItem('athena_users') || "[]");
            if(users.find(u => u.email === email) || email === ADMIN_USER) return showError("User already exists");
            
            users.push({ name, email, pass });
            localStorage.setItem('athena_users', JSON.stringify(users));
            
            window.currentUser = { name, email };
            window.switchSection('chat');
            listenToHistory(); // Start pulling from Firebase
        }

        window.loginUser = function() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pw').value;
            
            if (email === ADMIN_USER && pass === ADMIN_PASS) {
                window.currentUser = { name: "Administrator", email: "admin@athena.ai" };
                window.switchSection('chat');
                listenToHistory(); // Start pulling from Firebase
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('athena_users') || "[]");
            const found = users.find(u => u.email === email && u.pass === pass);
            
            if(found) {
                window.currentUser = found;
                window.switchSection('chat');
                listenToHistory(); // Start pulling from Firebase
            } else {
                showError("Invalid credentials");
            }
        }

        // --- AI API Implementation (Hugging Face Router) ---
        async function askAI(prompt, retryCount = 0) {
            try {
                const response = await fetch("https://router.huggingface.co/v1/chat/completions", {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "mistralai/Mistral-7B-Instruct-v0.2:featherless-ai",
                        messages: [
                            { role: "system", content: "You are Athena, a helpful AI. Support markdown formatting in your responses." },
                            { role: "user", content: prompt }
                        ],
                        stream: false
                    })
                });

                if (!response.ok) {
                    if (retryCount < 5) {
                        const delays = [1000, 2000, 4000, 8000, 16000];
                        await new Promise(r => setTimeout(r, delays[retryCount]));
                        return askAI(prompt, retryCount + 1);
                    }
                    throw new Error("Chatbot is currently busy.");
                }

                const data = await response.json();
                return data.choices?.[0]?.message?.content || "I'm sorry, I couldn't process that.";
            } catch (err) {
                console.error("AI Error:", err);
                return retryCount >= 5 ? "I'm experiencing a high load. Please try again later." : "Connection error. Retrying...";
            }
        }

        // --- Chat Logic ---
        function addChatMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            
            if (sender === 'bot') {
                const rawHtml = marked.parse(text);
                const cleanHtml = DOMPurify.sanitize(rawHtml);
                div.innerHTML = cleanHtml;
            } else {
                div.textContent = text;
            }
            
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function handleChatSubmit() {
            const text = chatInput.value.trim();
            if(!text) return;
            
            chatInput.value = '';
            addChatMessage(text, 'user');
            
            const botDiv = document.createElement('div');
            botDiv.className = 'message bot';
            botDiv.innerHTML = '<div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
            chatMessages.appendChild(botDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            const reply = await askAI(text);
            botDiv.innerHTML = DOMPurify.sanitize(marked.parse(reply));
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            saveToHistory(text, reply);
            chatInput.focus();
        }

        // --- Speech Logic ---
        function initSpeech() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                speechStarButton.classList.add('listening');
                speechStatus.textContent = "Listening...";
                speechText.innerHTML = "";
            };

            recognition.onend = () => {
                isListening = false;
                speechStarButton.classList.remove('listening');
                if(!isSpeaking) speechStatus.textContent = "Tap to speak";
            };

            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                speechText.innerHTML = `<div class="text-xl font-medium text-blue-400 drop-shadow-[0_0_8px_rgba(59,130,246,0.3)]">${transcript}</div>`;
                speechStatus.textContent = "Thinking...";
                const reply = await askAI(transcript);
                speakResponse(reply);
                saveToHistory(transcript, reply);
            };

            recognition.onerror = () => {
                speechStatus.textContent = "Error, try again";
                speechStarButton.classList.remove('listening');
            };
        }

        function cleanMarkdownToSentences(text) {
            let cleaned = text.split('\n').map(line => {
                let trimmed = line.trim();
                if (trimmed.startsWith('|') && (trimmed.includes('---') || trimmed.replace(/[^|]/g, "").length > 3)) return ""; 
                trimmed = trimmed.replace(/\|/g, ' ');
                trimmed = trimmed.replace(/^[-*+]\s+/, '');
                trimmed = trimmed.replace(/^\d+\.\s+/, '');
                return trimmed;
            }).filter(line => line.length > 0).join('\n');

            cleaned = cleaned.replace(/```[\s\S]*?```/g, ''); 
            cleaned = cleaned.replace(/[*_#`~]/g, ''); 
            cleaned = cleaned.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1'); 
            cleaned = cleaned.replace(/\s+/g, ' ').trim();

            const sentences = cleaned.match(/[^.!?]+[.!?]+(\s|$)/g);
            if (!sentences) return cleaned.length > 0 ? [cleaned] : [];
            return sentences.map(s => s.trim()).filter(s => s.length > 1);
        }

        function speakResponse(text) {
            window.speechSynthesis.cancel();
            speechQueue = cleanMarkdownToSentences(text);
            speechQueueIndex = 0;

            if (speechQueue.length === 0) {
                isSpeaking = false;
                speechSection.classList.remove('speaking');
                speechStatus.textContent = "Tap to speak";
                speechText.innerHTML = "";
                return;
            }

            isSpeaking = true;
            speechSection.classList.add('speaking');
            speechStatus.textContent = "Athena speaking";
            speakNextSentence();
        }

        function speakNextSentence() {
            if (!isSpeaking || speechQueueIndex >= speechQueue.length) {
                isSpeaking = false;
                speechSection.classList.remove('speaking');
                speechStatus.textContent = "Tap to speak";
                renderLyrics();
                return;
            }

            const currentSentenceText = speechQueue[speechQueueIndex];
            const utterance = new SpeechSynthesisUtterance(currentSentenceText);

            const voices = window.speechSynthesis.getVoices();
            const femaleVoiceNames = ["samantha", "zira", "google us english", "hazel", "moira", "tessa", "karen", "veena", "susan", "victoria"];
            
            let selectedVoice = voices.find(v => femaleVoiceNames.some(f => v.name.toLowerCase().includes(f)) && v.lang.startsWith('en')) || 
                                voices.find(v => v.name.toLowerCase().includes('female') && v.lang.startsWith('en')) ||
                                voices.find(v => v.lang.startsWith('en'));
            
            if (selectedVoice) utterance.voice = selectedVoice;

            utterance.onstart = () => renderLyrics();
            utterance.onend = () => { speechQueueIndex++; speakNextSentence(); };
            utterance.onerror = (e) => { speechQueueIndex++; speakNextSentence(); };

            window.speechSynthesis.speak(utterance);
        }

        function renderLyrics() {
            if (speechQueue.length === 0 || speechQueueIndex >= speechQueue.length) {
                speechText.innerHTML = "";
                return;
            }

            const prevText = speechQueueIndex - 1 >= 0 ? speechQueue[speechQueueIndex - 1] : "";
            const currentText = speechQueueIndex < speechQueue.length ? speechQueue[speechQueueIndex] : "";
            const nextText = speechQueueIndex + 1 < speechQueue.length ? speechQueue[speechQueueIndex + 1] : "";

            speechText.innerHTML = `
                <div class="flex flex-col items-center justify-center space-y-3 transition-all duration-500 ease-in-out">
                    <div class="text-xs md:text-sm text-gray-500 opacity-30 line-clamp-1 h-5 select-none pointer-events-none transition-all duration-500">${prevText}</div>
                    <div class="text-xl md:text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-white to-pink-400 drop-shadow-[0_0_15px_rgba(59,130,246,0.6)] scale-105 transition-all duration-500 text-center px-4 leading-relaxed">${currentText}</div>
                    <div class="text-xs md:text-sm text-gray-500 opacity-30 line-clamp-1 h-5 select-none pointer-events-none transition-all duration-500">${nextText}</div>
                </div>
            `;
        }

        // --- Events ---
        chatSend.onclick = (e) => { e.preventDefault(); handleChatSubmit(); };
        chatInput.onkeypress = (e) => { if (e.key === 'Enter') { e.preventDefault(); handleChatSubmit(); } };
        
        historyTrigger.onclick = (e) => { e.stopPropagation(); toggleHistory(); };

        document.addEventListener('mousedown', (e) => {
            if (historyPanelOpen && !historyPanel.contains(e.target) && !historyTrigger.contains(e.target)) {
                closeHistory();
            }
        });

        speechStarButton.onclick = () => {
            if (isSpeaking) {
                window.speechSynthesis.cancel();
                isSpeaking = false;
                speechSection.classList.remove('speaking');
                speechStatus.textContent = "Tap to speak";
                speechText.innerHTML = "";
                return;
            }
            if (isListening) recognition.stop();
            else recognition.start();
        };

        // Added event listener for New Chat
        document.getElementById('nav-new-chat').onclick = window.startNewChat;

        document.getElementById('nav-chat').onclick = () => window.switchSection('chat');
        document.getElementById('nav-speech').onclick = () => window.switchSection('speech');
        
        document.getElementById('nav-logout').onclick = () => {
            window.currentUser = null;
            if(activeHistoryListener) {
                off(activeHistoryListener);
                activeHistoryListener = null;
            }
            window.switchSection('login');
        };

        window.onload = () => {
            window.renderLoginContent()
            initSpeech();
            if (typeof window !== 'undefined' && window.speechSynthesis) window.speechSynthesis.getVoices();
        };
    </script>
</body>
</html>
